apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: check-netpol
  namespace: aplikacja-cicd
spec:
  params:
    - name: manifest-dir
      type: string
      default: k8s
    - name: git-url
      type: string
    - name: git-user-email
      type: string
      default: "pipeline@cicd.local"
    - name: git-user-name
      type: string
      default: "CICD Pipeline"
  results:
    - name: netpol-status
      description: "EXISTS or GENERATED"
  workspaces:
    - name: source
  steps:
    - name: check-and-generate
      image: registry.access.redhat.com/ubi9/ubi:latest
      env:
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: git-credentials
              key: token
      script: |
        #!/bin/bash
        set -e

        dnf install -y git jq python3-pyyaml > /dev/null 2>&1

        curl -sL -o /usr/local/bin/roxctl https://mirror.openshift.com/pub/rhacs/assets/4.10.0/bin/Linux/roxctl
        chmod +x /usr/local/bin/roxctl

        MANIFEST_DIR=$(workspaces.source.path)/$(params.manifest-dir)

        echo "=== Checking for existing NetworkPolicy in ${MANIFEST_DIR} ==="
        NETPOL_COUNT=$(grep -rl "kind: NetworkPolicy" ${MANIFEST_DIR}/ 2>/dev/null | wc -l)

        if [ "$NETPOL_COUNT" -gt 0 ]; then
          echo "Found $NETPOL_COUNT file(s) with NetworkPolicy."
          echo "=== NetworkPolicy already exists ==="
          echo -n "EXISTS" > $(results.netpol-status.path)
          exit 0
        fi

        echo "=== No NetworkPolicy found. Generating... ==="
        roxctl netpol generate "${MANIFEST_DIR}" -f "${MANIFEST_DIR}/generated-netpol.yaml" 2>&1 || true

        if [ ! -f "${MANIFEST_DIR}/generated-netpol.yaml" ]; then
          echo "WARNING: roxctl netpol generate did not produce output"
          echo -n "FAILED" > $(results.netpol-status.path)
          exit 1
        fi

        # Post-process: add TCP:53 next to every UDP:53 rule (OVN/glibc needs both)
        echo "=== Post-processing: adding TCP:53 to DNS egress rules ==="
        python3 << 'PYEOF'
        import yaml
        import sys

        with open("${MANIFEST_DIR}/generated-netpol.yaml", "r") as f:
            content = f.read()

        docs = list(yaml.safe_load_all(content))
        modified = False

        for doc in docs:
            if not doc or doc.get("kind") != "NetworkPolicy":
                continue
            for rule in doc.get("spec", {}).get("egress", []):
                ports = rule.get("ports", [])
                has_udp53 = any(p.get("port") == 53 and p.get("protocol") == "UDP" for p in ports)
                has_tcp53 = any(p.get("port") == 53 and p.get("protocol") == "TCP" for p in ports)
                if has_udp53 and not has_tcp53:
                    ports.append({"port": 53, "protocol": "TCP"})
                    modified = True

        if modified:
            print("Added TCP:53 to DNS egress rules")
        else:
            print("No DNS rules to modify")

        with open("${MANIFEST_DIR}/generated-netpol.yaml", "w") as f:
            yaml.dump_all(docs, f, default_flow_style=False)
        PYEOF

        echo "=== Generated NetworkPolicy ==="
        cat "${MANIFEST_DIR}/generated-netpol.yaml"

        echo ""
        echo "=== Pushing to new branch ==="
        cd $(workspaces.source.path)
        git config --global --add safe.directory $(workspaces.source.path)

        git config user.email "$(params.git-user-email)"
        git config user.name "$(params.git-user-name)"

        BRANCH="netpol/auto-$(date +%Y%m%d-%H%M%S)"
        git checkout -b "${BRANCH}"
        git add $(params.manifest-dir)/generated-netpol.yaml
        git commit -m "Auto-generated NetworkPolicy by CICD pipeline"

        GIT_URL=$(echo "$(params.git-url)" | sed "s|https://|https://pipeline:${GIT_TOKEN}@|")
        git push "${GIT_URL}" "${BRANCH}" 2>&1

        echo "=== Branch ${BRANCH} pushed ==="

        # Create GitHub PR
        REPO_PATH=$(echo "$(params.git-url)" | sed 's|https://github.com/||;s|\.git$||')
        PR_RESPONSE=$(curl -s -X POST \
          -H "Authorization: token ${GIT_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" \
          "https://api.github.com/repos/${REPO_PATH}/pulls" \
          -d "{
            \"title\": \"Auto-generated NetworkPolicy\",
            \"body\": \"NetworkPolicy wygenerowane automatycznie przez CICD pipeline.\\n\\nZmiany:\\n- Dodano TCP:53 obok UDP:53 dla kompatybilności z OVN/glibc\\n\\nPrzejrzyj i zatwierdź.\",
            \"head\": \"${BRANCH}\",
            \"base\": \"main\"
          }")

        PR_URL=$(echo "$PR_RESPONSE" | jq -r '.html_url // "PR creation failed"')
        echo "=== PR: ${PR_URL} ==="

        echo -n "GENERATED" > $(results.netpol-status.path)
