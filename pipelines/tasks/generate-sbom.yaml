apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: generate-sbom
  namespace: aplikacja-cicd
spec:
  params:
    - name: image
      type: string
  workspaces:
    - name: source
    - name: shared-data
  steps:
    - name: generate-sbom
      image: anchore/syft:latest
      script: |
        #!/bin/sh
        set -e
        echo "=== Generating SBOM for $(params.image) ==="
        syft registry:$(params.image) -o spdx-json > $(workspaces.shared-data.path)/sbom.spdx.json
        echo "=== SBOM generated ==="
        echo "SBOM size: $(wc -c < $(workspaces.shared-data.path)/sbom.spdx.json) bytes"
        echo "Package count: $(cat $(workspaces.shared-data.path)/sbom.spdx.json | grep -c '"SPDX"' || echo 'N/A')"
